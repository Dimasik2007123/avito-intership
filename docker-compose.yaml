version: "3.8"

services:
  backend:
    build: ./server
    ports:
      - "8080:8080"
    environment:
      - port=8080
      - HOST=0.0.0.0
    networks:
      - app-network

  frontend:
    build: ./client
    ports:
      - "5173:3000"
    environment:
      - DOCKER_ENV=true
    networks:
      - app-network
    depends_on:
      - backend

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - app-network
    command: >
      sh -c "ollama pull llama3 && sleep 5 && ollama serve && wait"

networks:
  app-network:
    driver: bridge

volumes:
  ollama_data:
